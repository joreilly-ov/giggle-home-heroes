name: Scheduled DB Seed

# Runs twice daily to keep the Cloud Run API and Supabase database active and
# accumulate realistic test content over time.
#
# Required repository secrets:
#   SEED_OWNER_EMAIL     — email for a test vehicle owner account
#   SEED_OWNER_PASSWORD  — password for the above
#   SEED_GARAGE_EMAIL    — email for a test garage account
#   SEED_GARAGE_PASSWORD — password for the above
#
# The script exercises the full job lifecycle:
#   create job → publish → bid → accept bid → milestones → approve milestone

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC daily
    - cron: "0 20 * * *"  # 20:00 UTC daily
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  seed:
    name: Run DB seed
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run seed script
        run: npx tsx scripts/db-seed.ts
        env:
          SEED_OWNER_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
          SEED_OWNER_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
          SEED_GARAGE_EMAIL: ${{ secrets.SEED_GARAGE_EMAIL }}
          SEED_GARAGE_PASSWORD: ${{ secrets.SEED_GARAGE_PASSWORD }}

      - name: Run unit tests (seed helpers)
        run: npx vitest run src/test/scheduled-db-seed.test.ts
